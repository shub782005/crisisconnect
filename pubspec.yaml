name: crisisconnect
description: AI-powered disaster relief coordination platform

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.4
  firebase_storage: ^12.3.3
  cloud_functions: ^5.1.4

  # State Management
  provider: ^6.1.1

  # Maps
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  

  # UI
  flutter_local_notifications: ^17.1.2
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  fl_chart: ^0.66.2
  shimmer: ^3.0.0

  # Utilities
  http: ^1.2.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  uuid: ^4.3.3
  permission_handler: ^11.3.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
